<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JL Interactive Magazine</title>

<style>
body {
  margin: 0;
  overflow-x: hidden;
  font-family: Arial, sans-serif;
}

/* Canvas 전체 화면 */
canvas {
  display: block;
}

/* 오른쪽 갤러리 (PC 기본) */
#gallery {
  position: fixed;
  right: 20px;
  top: 100px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 5;
}

/* 이미지 */
#gallery img {
  width: 160px;
  height: 160px;
  object-fit: cover;
  cursor: pointer;
  border-radius: 0;
  transition: transform 0.2s ease;
  -webkit-tap-highlight-color: transparent;
}

/* hover 효과 (PC) */
#gallery img:hover {
  transform: scale(1.05);
}

/* 팝업 */
#popup {
  position: fixed;
  top: 0;
  right: -400px;
  width: 400px;
  height: 100%;
  background: white;
  box-shadow: -10px 0 30px rgba(0,0,0,0.2);
  transition: right 0.4s ease;
  z-index: 20;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* 팝업 열림 */
#popup.open {
  right: 0;
}

#popup img {
  max-width: 80%;
  max-height: 60%;
}

#popup p {
  margin-top: 20px;
  font-size: 14px;
}

/* ========================= */
/* 📱 태블릿 */
@media (max-width: 768px) {
  #gallery img {
    width: 110px;
    height: 110px;
  }

  #popup {
    width: 300px;
  }
}

/* ========================= */
/* 📱 모바일 (핵심 UX 개선) */
@media (max-width: 480px) {

  /* 갤러리 → 하단 바 형태 */
  #gallery {
    top: auto;
    bottom: 10px;
    right: 50%;
    transform: translateX(50%);
    flex-direction: row;
    gap: 6px;
    background: rgba(255,255,255,0.9);
    padding: 6px 10px;
    border-radius: 12px;
    backdrop-filter: blur(8px);
  }

  #gallery img {
    width: 70px;
    height: 70px;
  }

  /* 팝업 → 전체 화면 */
  #popup {
    width: 100%;
    right: -100%;
  }

  #popup.open {
    right: 0;
  }

  #popup img {
    max-width: 90%;
    max-height: 50%;
  }

  #popup p {
    font-size: 16px;
    padding: 0 20px;
    text-align: center;
  }
}

</style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- 갤러리 및 팝업 영역 -->
<div id="gallery"></div>
<div id="popup"></div>

<script type="module" src="./content.js"></script>
<script type="module" src="./main.js"></script>

</body>
</html>
